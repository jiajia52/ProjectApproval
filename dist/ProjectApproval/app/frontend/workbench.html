<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审批工作台</title>
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <div class="page-shell">
    <nav class="top-nav">
      <a class="nav-link" href="/ui/approval.html">项目列表</a>
      <a class="nav-link active" href="/ui/workbench.html">审批工作台</a>
      <a class="nav-link" href="/ui/skills.html">Skill 调整</a>
    </nav>

    <header class="hero">
      <div>
        <p class="eyebrow">Approval Workbench</p>
        <h1>审批工作台</h1>
        <p class="hero-copy">
          这里继续负责远程接口配置、审批样例、手工 JSON 审批和远程项目审批。
          如果从项目详情页进入，会自动带上当前项目 ID。
        </p>
      </div>
      <div class="hero-panel">
        <p class="panel-label">Mode</p>
        <h2>配置与审批分区</h2>
        <p class="hero-copy">
          顶部区域恢复成之前的样式，项目归档目录和审批落盘路径仍然保留在下面的实际操作区。
        </p>
      </div>
    </header>

    <main class="grid">
      <section class="card span-2">
        <div class="section-head">
          <div>
            <p class="panel-label">Integration</p>
            <h2>远程接口配置</h2>
          </div>
          <div class="button-row">
            <button id="refresh-token-button" class="ghost-button" type="button">刷新 Token</button>
            <button id="save-integration-button" class="ghost-button" type="button">保存配置</button>
          </div>
        </div>

        <form class="config-form">
          <label>
            <span>Base URL</span>
            <input id="integration_base_url" type="text">
          </label>
          <label>
            <span>Bearer Token</span>
            <input id="integration_token" type="text">
          </label>
          <label>
            <span>JSESSIONID</span>
            <input id="integration_jsessionid" type="text">
          </label>
          <label>
            <span>超时(秒)</span>
            <input id="integration_timeout" type="number" min="1">
          </label>
          <label>
            <span>IAM 回调 URL</span>
            <input id="integration_iam_full_url" type="text">
          </label>
          <label>
            <span>IAM Code</span>
            <input id="integration_iam_code" type="text">
          </label>
          <label>
            <span>启用 IAM 刷新</span>
            <select id="integration_use_iam">
              <option value="false">否</option>
              <option value="true">是</option>
            </select>
          </label>
          <label>
            <span>校验证书</span>
            <select id="integration_verify_ssl">
              <option value="false">否</option>
              <option value="true">是</option>
            </select>
          </label>
          <label>
            <span>CA Bundle Path</span>
            <input id="integration_ca_bundle_path" type="text" placeholder="留空则使用 requests 默认 CA">
          </label>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <p class="panel-label">Approval</p>
            <h2>审批入口</h2>
          </div>
        </div>

        <div class="button-row">
          <button id="load-sample-button" class="ghost-button" type="button">加载样例</button>
          <button id="approve-generated-button" class="ghost-button" type="button">审批生成项目</button>
          <button id="approve-button" class="primary-button" type="button">审批当前 JSON</button>
        </div>

        <div class="meta-grid" style="margin-top: 16px;">
          <div class="meta-item">
            <strong>审批品类</strong>
            <select id="approval-category" style="margin-top: 8px;"></select>
          </div>
          <div class="meta-item">
            <strong>当前项目</strong>
            <div id="selected-project-meta" style="margin-top: 8px; color: var(--muted);">未指定远程项目。</div>
          </div>
        </div>

        <div class="button-row" style="margin-top: 16px;">
          <button id="load-remote-button" class="ghost-button" type="button">载入远程项目</button>
          <button id="approve-remote-button" class="ghost-button" type="button">审批远程项目</button>
        </div>
      </section>

      <section class="card span-2">
        <div class="section-head">
          <div>
            <p class="panel-label">Payload</p>
            <h2>审批输入 JSON</h2>
          </div>
        </div>
        <label class="textarea-field">
          <textarea id="approval-payload" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <p class="panel-label">Result</p>
            <h2>审批结果</h2>
          </div>
        </div>
        <div id="approval-result" class="result-box">等待执行审批。</div>
      </section>
    </main>
  </div>
  <script src="/ui/workbench.js"></script>
</body>
</html>
